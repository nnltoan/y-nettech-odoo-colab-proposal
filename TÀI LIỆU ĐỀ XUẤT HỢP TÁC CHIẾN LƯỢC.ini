PHẦN 4: BỨC TRANH WORKFLOW (Y-NETTECH x DANAEXPERTS)
Mô phỏng kiến trúc dữ liệu liên thông End-to-End cho nhà máy:
[ TẦNG MÁY MÓC / HARDWARE ] ---> [ TẦNG TÍCH HỢP ] ---> [ TẦNG QUẢN TRỊ / SOFTWARE ]
      (Y-NetTech)                  (Odoo IoT)               (DanaExperts - Odoo)

1. Cảm biến, Robot, PLC      ---> Odoo IoT Box / API --->  Nhận dữ liệu OEE Real-time.
2. Máy quét Barcode/RFID     ---> Bắn dữ liệu trực tiếp->  Cập nhật tồn kho tự động.
3. Tablet tại chuyền (Shop Floor)                       ->  Công nhân nhận lệnh sản xuất, 
                                                            không cần ghi chép giấy.
Ghi chú kỹ thuật cho Y-NetTech: Đối với máy móc cũ không hỗ trợ API, DanaExperts có thể triển khai lấy dữ liệu qua việc đọc trực tiếp Database (Middleware) hoặc cấu hình Export/Import File tự động để đảm bảo dữ liệu luôn xuyên suốt
.

