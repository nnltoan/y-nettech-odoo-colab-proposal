PHẦN 6: LỘ TRÌNH TRIỂN KHAI RỦI RO THẤP (LOW-RISK ROADMAP)
Để đảm bảo an toàn vận hành cho 2.000 nhân sự, DanaExperts đề xuất triển khai theo phương pháp "Cuốn chiếu" (Agile):
Giai đoạn 1 (Pilot - Thử nghiệm): Lựa chọn 1 dây chuyền hoặc 1 phòng ban. Tích hợp phần cứng Y-NetTech vào Odoo IoT để thu thập dữ liệu tự động, đánh giá sự thay đổi so với quy trình cũ
.
Giai đoạn 2 (Scale Up - Mở rộng): Triển khai đồng loạt các phân hệ Mua Hàng ➔ Kho ➔ MES (Sản xuất) ➔ Giao hàng cho toàn bộ phần còn lại của nhà máy
.
Giai đoạn 3 (Tối ưu hóa UI/UX): Tùy chỉnh giao diện "Kiosk Mode" (nút bấm lớn, thao tác một chạm) dành riêng cho các operator lớn tuổi người Nhật/Việt để loại bỏ rào cản công nghệ
.

